<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header class="header-section">
      <div class="logo">
        <img src="./assets/github-logo.png" alt="" class="logo-image" />
        <h2 class="logo-heading">gitHub issues tracker</h2>
      </div>
      <div class="search-container">
        <div class="input-field">
          <img src="./assets/search.png" alt="" class="search-icon" />
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search issues..."
          />
        </div>
        <button class="btn btn-active">Search</button>
      </div>
    </header>
    <section class="tab-section">
      <button class="btn btn-active">All</button>
      <button class="btn">Open</button>
      <button class="btn">Closed</button>
    </section>
    <section class="counter-section">
      <div class="left-side">
        <div class="counter-image">
          <img src="./assets/Aperture.png" alt="" />
        </div>
        <div class="counter-details">
          <h2 class="counter-inner">
            <span id="counter">20</span>
            Issues
          </h2>
          <p class="h-paragraph">Track and manage your project issues</p>
        </div>
      </div>
      <div class="right-side">
        <div class="indicator-container">
          <div class="indicator indicator-open"></div>
          <p class="indicator-name">Open</p>
        </div>
        <div class="indicator-container">
          <div class="indicator indicator-closed"></div>
          <p class="indicator-name">Closed</p>
        </div>
      </div>
    </section>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
