<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header class="header-section">
      <div class="logo">
        <img src="./assets/github-logo.png" alt="" class="logo-image" />
        <h2 class="logo-heading">gitHub issues tracker</h2>
      </div>
      <div class="search-container">
        <div class="input-field">
          <img src="./assets/search.png" alt="" class="search-icon" />
          <input type="text" id="search-input" class="search-input" />
        </div>
        <button class="btn btn-active">Search</button>
      </div>
    </header>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
